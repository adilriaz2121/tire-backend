name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            echo "🔄 Starting deployment for backend..."

            # Ensure project directory exists
            mkdir -p /var/www/tire-backend
            cd /var/www/tire-backend

            # Clone or pull latest code
            if [ ! -d ".git" ]; then
              git clone https://github.com/Saif-Arshad/tire-backend.git .
            else
              git pull origin main
            fi

            npm install --production
            npx prisma generate
            npm run build || echo "No build step"

            echo "🚀 Restarting backend with PM2..."
            pm2 start npm --name "tire-backend" -- run start || pm2 restart tire-backend

            echo "✅ Deployment complete!"
