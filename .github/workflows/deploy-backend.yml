name: Deploy Tire Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate .env file
        run: |
          echo "${{ secrets.SERVER_ENV }}" >> .env

      - name: Sync files to server
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: .
          remote_path: /var/www/tire-backend
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USERNAME }}
          remote_key: ${{ secrets.SERVER_PRIVATE_KEY }}

      - name: Install and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            echo "🚀 Deploying tire-backend..."
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh

            cd /var/www/tire-backend

            npm install --production
            npx prisma generate
            npm run build || echo "No build script found"

            pm2 start npm --name "tire-backend" -- run start || pm2 restart tire-backend

            echo "✅ Deployment finished successfully."
